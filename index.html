<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DropFlow — Plataforma Dropshipping</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="auth-grid"></div>
    <div class="auth-glow"></div>
  </div>

  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-mark">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <path d="M18 3L33 12V24L18 33L3 24V12L18 3Z" fill="var(--accent)" opacity="0.15"/>
          <path d="M18 3L33 12V24L18 33L3 24V12L18 3Z" stroke="var(--accent)" stroke-width="1.5"/>
          <path d="M18 10L26 15V25L18 30L10 25V15L18 10Z" fill="var(--accent)" opacity="0.3"/>
          <circle cx="18" cy="18" r="3" fill="var(--accent)"/>
        </svg>
      </div>
      <span class="brand-name">DropFlow</span>
    </div>

    <!-- LOGIN FORM -->
    <div class="auth-card" id="loginCard">
      <div class="auth-header">
        <h1>Bienvenido</h1>
        <p>Accede a tu plataforma de gestión</p>
      </div>
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
        <div class="field-group">
          <label for="loginEmail">Correo electrónico</label>
          <input type="email" id="loginEmail" placeholder="tu@correo.com" required />
        </div>
        <div class="field-group">
          <label for="loginPassword">Contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="loginPassword" placeholder="••••••••" required />
            <button type="button" class="toggle-pass" onclick="togglePassword('loginPassword', this)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div id="loginError" class="auth-error hidden"></div>
        <button type="submit" class="btn-primary" id="loginBtn">
          <span class="btn-text">Iniciar sesión</span>
          <span class="btn-loader hidden"></span>
        </button>
      </form>
      <div class="auth-switch">
        ¿No tienes cuenta? <a href="#" onclick="switchCard('register')">Regístrate gratis</a>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div class="auth-card hidden" id="registerCard">
      <div class="auth-header">
        <h1>Crear cuenta</h1>
        <p>Empieza a gestionar tu tienda hoy</p>
      </div>
      <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
        <div class="field-group">
          <label for="regName">Nombre completo</label>
          <input type="text" id="regName" placeholder="Tu nombre completo" required />
        </div>
        <div class="field-group">
          <label for="regEmail">Correo electrónico</label>
          <input type="email" id="regEmail" placeholder="tu@correo.com" required />
        </div>
        <div class="field-group">
          <label for="regPassword">Contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="regPassword" placeholder="Mín. 6 caracteres" required minlength="6"/>
            <button type="button" class="toggle-pass" onclick="togglePassword('regPassword', this)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="field-group">
          <label for="regRole">Tipo de cuenta</label>
          <select id="regRole">
            <option value="user">Vendedor</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
        <div id="registerError" class="auth-error hidden"></div>
        <button type="submit" class="btn-primary" id="registerBtn">
          <span class="btn-text">Crear cuenta</span>
          <span class="btn-loader hidden"></span>
        </button>
      </form>
      <div class="auth-switch">
        ¿Ya tienes cuenta? <a href="#" onclick="switchCard('login')">Iniciar sesión</a>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
